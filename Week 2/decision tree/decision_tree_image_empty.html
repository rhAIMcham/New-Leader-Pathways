<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workload Scenario</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --purple-50: #EEEDFE;
    --purple-200: #AFA9EC;
    --purple-600: #534AB7;
    --purple-800: #3C3489;
    --purple-900: #26215C;
    --teal-50: #E1F5EE;
    --teal-600: #0F6E56;
    --teal-800: #085041;
    --coral-50: #FAECE7;
    --coral-600: #993C1D;
    --gray-50: #F1EFE8;
    --gray-100: #D3D1C7;
    --gray-200: #B4B2A9;
    --gray-400: #888780;
    --gray-600: #5F5E5A;
    --gray-800: #444441;
    --white: #ffffff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "IBM Plex Sans", sans-serif; background: var(--gray-50); min-height: 100vh; color: var(--gray-800); }

  .page-header {
    background: var(--white);
    border-bottom: 0.5px solid var(--gray-100);
    padding: 24px 32px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 24px;
  }
  .header-text h1 { font-size: 22px; font-weight: 500; color: var(--purple-900); margin-bottom: 4px; }
  .header-text p { font-size: 14px; color: var(--gray-600); max-width: 560px; line-height: 1.6; }
  .reset-link {
    display: inline-block; margin-top: 10px; font-size: 12px; color: var(--gray-400);
    background: none; border: none; cursor: pointer; font-family: inherit; text-decoration: underline;
  }
  .reset-link:hover { color: var(--coral-600); }

  .step-summary {
    background: var(--purple-50);
    border: 0.5px solid var(--purple-200);
    border-radius: 12px;
    padding: 14px 20px;
    min-width: 200px;
    text-align: center;
    flex-shrink: 0;
  }
  .step-summary .big-num { font-size: 36px; font-weight: 500; color: var(--purple-600); line-height: 1; }
  .step-summary .label { font-size: 12px; color: var(--purple-800); margin-top: 4px; letter-spacing: 0.04em; }
  .pip-track { display: flex; gap: 5px; flex-wrap: wrap; justify-content: center; margin-top: 10px; }
  .pip { width: 12px; height: 12px; border-radius: 50%; background: var(--gray-100); transition: background 0.2s; }
  .pip.on { background: var(--purple-600); }

  .main { max-width: 760px; margin: 0 auto; padding: 32px 24px; }
  .section-eyebrow {
    font-size: 11px; font-weight: 500; letter-spacing: 0.08em; color: var(--gray-400);
    text-transform: uppercase; margin-bottom: 12px; display:flex; align-items:center; justify-content:space-between;
  }

  .scene-card {
    background: var(--white);
    border: 0.5px solid var(--gray-100);
    border-radius: 12px;
    padding: 22px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .image-wrap {
    width: 100%;
    aspect-ratio: 16 / 9;
    border-radius: 8px;
    overflow: hidden;
    background: var(--gray-50);
    border: 1px dashed var(--gray-200);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .image-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .image-placeholder-label {
    color: var(--gray-400);
    font-size: 12px;
    font-family: "IBM Plex Sans", sans-serif;
    text-align: center;
    padding: 8px;
  }

  .scene-text {
    font-size: 15px;
    color: var(--gray-800);
    line-height: 1.7;
  }

  .sub-label {
    font-size: 11px; font-weight: 500; color: var(--gray-400); letter-spacing: 0.05em;
    text-transform: uppercase; margin-bottom: 8px;
  }

  .opt-col { display: flex; flex-direction: column; gap: 8px; }
  .opt-btn {
    font-size: 14px;
    font-family: "IBM Plex Sans", sans-serif;
    padding: 12px 16px;
    border-radius: 8px;
    border: 0.5px solid var(--gray-200);
    background: transparent;
    color: var(--gray-800);
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
  }
  .opt-btn:hover { background: var(--purple-50); border-color: var(--purple-600); color: var(--purple-800); }

  .opt-btn.restart-btn {
    color: var(--coral-600);
    border-color: var(--coral-50);
    background: var(--coral-50);
    text-align: center;
    font-weight: 500;
  }
  .opt-btn.restart-btn:hover { border-color: var(--coral-600); }

  @media (max-width: 640px) {
    .page-header { flex-direction: column; }
    .step-summary { min-width: auto; width: 100%; }
    .main { padding: 20px 16px; }
  }
</style>
</head>
<body>

<div class="page-header">
  <div class="header-text">
    <h1>Workload Scenario</h1>
    <p>Work through the scenario by choosing how you'd respond at each step. There's no single right answer — see where your choices lead.</p>
    <button class="reset-link" onclick="startGame()">Reset and start over</button>
  </div>
  <div class="step-summary">
    <div class="big-num" id="bigCount">1</div>
    <div class="label">step</div>
    <div class="pip-track" id="pipTrack"></div>
  </div>
</div>

<div class="main">
  <div class="section-eyebrow">Scenario</div>
  <div class="scene-card">
    <div id="image-area" class="image-wrap"></div>
    <div id="text" class="scene-text">Text</div>
    <div>
      <div class="sub-label">What do you do?</div>
      <div id="option-buttons" class="opt-col"></div>
    </div>
  </div>
</div>

<script>
    const textElement = document.getElementById('text')
const optionButtonsElement = document.getElementById('option-buttons')
const imageElement = document.getElementById('image-area')
const bigCountElement = document.getElementById('bigCount')
const pipTrackElement = document.getElementById('pipTrack')

let state = {}
let stepCount = 1

function startGame() {
    state = {}
    stepCount = 1
    showTextNode(1)
}

function showTextNode(textNodeIndex) {
    const textNode = textNodes.find(textNode => textNode.id === textNodeIndex)
    textElement.innerText = textNode.text

    // Render image slot for this node.
    // Fill in textNode.image with a URL/path to swap in a real image automatically.
    while (imageElement.firstChild) {
        imageElement.removeChild(imageElement.firstChild)
    }
    if (textNode.image) {
        const img = document.createElement('img')
        img.src = textNode.image
        img.alt = `Screen ${textNode.id} image`
        imageElement.appendChild(img)
    } else {
        const label = document.createElement('div')
        label.classList.add('image-placeholder-label')
        label.innerText = `[ image placeholder: node ${textNode.id} ]`
        imageElement.appendChild(label)
    }

    while (optionButtonsElement.firstChild) {
        optionButtonsElement.removeChild(optionButtonsElement.firstChild)
    }

    const isEnding = textNode.options.length === 1 && textNode.options[0].nextText <= 0

    textNode.options.forEach(option => {
        if (showOption(option)) {
            const button = document.createElement('button')
            button.innerText = option.text
            button.classList.add('opt-btn')
            if (isEnding) button.classList.add('restart-btn')
            button.addEventListener('click', () => selectOption(option))
            optionButtonsElement.appendChild(button)
        }
    })

    renderProgress()
}

function renderProgress() {
    bigCountElement.textContent = stepCount
    pipTrackElement.innerHTML = ''
    const total = textNodes.length
    for (let i = 0; i < Math.min(stepCount, total); i++) {
        const d = document.createElement('div')
        d.className = 'pip on'
        pipTrackElement.appendChild(d)
    }
}


function showOption(option) {
    return option.requiredState == null || option.requiredState(state)
}

function selectOption(option){
    const nextTextNodeId = typeof option.nextText === "function"
    ? option.nextText()
    : option.nextText;

    if (nextTextNodeId <= 0) {
        return startGame();
    }
    state = Object.assign(state, option.setState)
    stepCount += 1
    showTextNode(nextTextNodeId);
}

]

startGame()
</script>
</body>
</html>
