<html lang="en">
<head>

<title>Workload Scenario</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --purple-50: #EEEDFE;
    --purple-200: #AFA9EC;
    --purple-600: #534AB7;
    --purple-800: #3C3489;
    --purple-900: #26215C;
    --teal-50: #E1F5EE;
    --teal-600: #0F6E56;
    --teal-800: #085041;
    --coral-50: #FAECE7;
    --coral-600: #993C1D;
    --gray-50: #F1EFE8;
    --gray-100: #D3D1C7;
    --gray-200: #B4B2A9;
    --gray-400: #888780;
    --gray-600: #5F5E5A;
    --gray-800: #444441;
    --white: #ffffff;
  }

  svg {
    fill: white;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "IBM Plex Sans", sans-serif; background: white; min-height: 100vh; color: var(--gray-800); }

  .page-header {
    background: var(--white);
    border-bottom: 0.5px solid var(--gray-100);
    padding: 24px 32px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 24px;
  }
  .header-text h1 { font-size: 22px; font-weight: 500; color: var(--purple-900); margin-bottom: 4px; }
  .header-text p { font-size: 14px; color: var(--gray-600); max-width: 560px; line-height: 1.6; }
  .reset-link {
    display: inline-block; margin-top: 10px; font-size: 12px; color: var(--gray-400);
    background: none; border: none; cursor: pointer; font-family: inherit; text-decoration: underline;
  }
  .reset-link:hover { color: var(--coral-600); }

  .step-summary {
    background: var(--purple-50);
    border: 0.5px solid var(--purple-200);
    border-radius: 12px;
    padding: 14px 20px;
    min-width: 200px;
    text-align: center;
    flex-shrink: 0;
  }
  .step-summary .big-num { font-size: 36px; font-weight: 500; color: var(--purple-600); line-height: 1; }
  .step-summary .label { font-size: 12px; color: var(--purple-800); margin-top: 4px; letter-spacing: 0.04em; }
  .pip-track { display: flex; gap: 5px; flex-wrap: wrap; justify-content: center; margin-top: 10px; }
  .pip { width: 12px; height: 12px; border-radius: 50%; background: var(--gray-100); transition: background 0.2s; }
  .pip.on { background: var(--purple-600); }

  .main { max-width: 760px; margin: 0 auto; padding: 32px 24px; }
  .section-eyebrow {
    font-size: 11px; font-weight: 500; letter-spacing: 0.08em; color: var(--gray-400);
    text-transform: uppercase; margin-bottom: 12px; display:flex; align-items:center; justify-content:space-between;
  }

  .scene-card {
    background: var(--white);
    border: 0.5px solid var(--gray-100);
    border-radius: 12px;
    padding: 22px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* ---- Icon badge (replaces photo placeholder) ---- */
  .icon-wrap {
    width: 100%;
    min-height: 140px;
    border-radius: 8px;
    background: var(--gray-50);
    border: 0.5px solid var(--gray-100);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .icon-badge {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: var(--purple-50);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .icon-badge.tone-warning { background: var(--coral-50); }
  .icon-badge.tone-positive { background: var(--teal-50); }
  .icon-badge svg {
    width: 34px;
    height: 34px;
    fill: none;
    stroke: var(--purple-600);
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .icon-badge.tone-warning svg {
    stroke: var(--coral-600);
  }

  .icon-badge.tone-positive svg {
    stroke: var(--teal-600);
  }

  .image-placeholder-label {
    color: var(--gray-400);
    font-size: 12px;
    font-family: "IBM Plex Sans", sans-serif;
    text-align: center;
    padding: 8px;
  }

  .scene-text {
    font-size: 15px;
    color: var(--gray-800);
    line-height: 1.7;
  }

  .sub-label {
    font-size: 11px; font-weight: 500; color: var(--gray-400); letter-spacing: 0.05em;
    text-transform: uppercase; margin-bottom: 8px;
  }

  .opt-col { display: flex; flex-direction: column; gap: 8px; }
  .opt-btn {
    font-size: 14px;
    font-family: "IBM Plex Sans", sans-serif;
    padding: 12px 16px;
    border-radius: 8px;
    border: 0.5px solid var(--gray-200);
    background: transparent;
    color: var(--gray-800);
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
  }
  .opt-btn:hover { background: var(--purple-50); border-color: var(--purple-600); color: var(--purple-800); }

  .opt-btn.restart-btn {
    color: var(--coral-600);
    border-color: var(--coral-50);
    background: var(--coral-50);
    text-align: center;
    font-weight: 500;
  }
  .opt-btn.restart-btn:hover { border-color: var(--coral-600); }

  @media (max-width: 640px) {
    .page-header { flex-direction: column; }
    .step-summary { min-width: auto; width: 100%; }
    .main { padding: 20px 16px; }
  }
</style>

function renderIcon(iconKey) {
    while (imageElement.firstChild) {
        imageElement.removeChild(imageElement.firstChild)
    }

    const icon = ICONS[iconKey]
    if (!icon) {
        imageElement.innerHTML = '<div class="image-placeholder-label">[ icon placeholder ]</div>'
        return
    }

    const badge = document.createElement('div')
    badge.className = 'icon-badge tone-' + (icon.tone === 'default' ? '' : icon.tone)

    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg')
    svg.setAttribute('viewBox', '0 0 48 48')
    svg.setAttribute('xmlns', 'http://www.w3.org/2000/svg')
    svg.innerHTML = icon.svg

    badge.appendChild(svg)
    imageElement.appendChild(badge)
}

function startGame() {
    state = {}
    stepCount = 1
    showTextNode(1)
}

function showTextNode(textNodeIndex) {
    const textNode = textNodes.find(textNode => textNode.id === textNodeIndex)
    textElement.innerHTML = textNode.text

    renderIcon(textNode.icon)

    while (optionButtonsElement.firstChild) {
        optionButtonsElement.removeChild(optionButtonsElement.firstChild)
    }

    const isEnding = textNode.options.length === 1 && textNode.options[0].nextText <= 0
    

    textNode.options.forEach(option => {
        if (showOption(option)) {
            const button = document.createElement('button')
            button.innerHTML = option.text
            button.classList.add('opt-btn')
            if (isEnding) button.classList.add('restart-btn')
            // if (isEnding) exported = true;
            button.addEventListener('click', () => selectOption(option))
            optionButtonsElement.appendChild(button)
        }
    })
    if (exported === false) {
        exportChoices.push(textElement.innerHTML);
    } else {
        return null;
    }

    // renderProgress()
    console.log(exportChoices);
    console.log(exported);
}

function showOption(option) {
    return option.requiredState == null || option.requiredState(state)
}

function selectOption(option){
    const nextTextNodeId = typeof option.nextText === "function"
    ? option.nextText()
    : option.nextText;

    if (nextTextNodeId <= 0) {
        exported = true;
        const removeFinal = exportChoices.pop();
         localStorage.setItem(STORAGE_KEY, JSON.stringify(exportChoices))
    
        //TODO include single use function here - function one(fn) => let hasRun = false; 
        return startGame();
    }
    state = Object.assign(state, option.setState)
    stepCount += 1
    showTextNode(nextTextNodeId);
}
