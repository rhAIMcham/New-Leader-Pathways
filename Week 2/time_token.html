<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Time Token Allocation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --purple-50: #EEEDFE;
      --purple-200: #AFA9EC;
      --purple-600: #534AB7;
      --purple-800: #3C3489;
      --purple-900: #26215C;
      --teal-50: #E1F5EE;
      --teal-600: #0F6E56;
      --teal-800: #085041;
      --coral-50: #FAECE7;
      --coral-600: #993C1D;
      --gray-50: #F1EFE8;
      --gray-100: #D3D1C7;
      --gray-200: #B4B2A9;
      --gray-400: #888780;
      --gray-600: #5F5E5A;
      --gray-800: #444441;
      --white: #ffffff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "IBM Plex Sans", sans-serif;
      background: var(--gray-50);
      min-height: 100vh;
      color: var(--gray-800);
    }

    .page-header {
      background: var(--white);
      border-bottom: 0.5px solid var(--gray-100);
      padding: 24px 32px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 24px;
    }

    .page-header h1 {
      font-size: 22px;
      font-weight: 500;
      color: var(--purple-900);
      margin-bottom: 4px;
    }

    .page-header p {
      font-size: 14px;
      color: var(--gray-600);
      max-width: 520px;
      line-height: 1.6;
    }

    .token-summary {
      background: var(--purple-50);
      border: 0.5px solid var(--purple-200);
      border-radius: 12px;
      padding: 14px 20px;
      min-width: 200px;
      text-align: center;
      flex-shrink: 0;
    }

    .token-summary .big-num {
      font-size: 36px;
      font-weight: 500;
      color: var(--purple-600);
      line-height: 1;
    }

    .token-summary .label {
      font-size: 12px;
      color: var(--purple-800);
      margin-top: 4px;
      letter-spacing: 0.04em;
    }

    .token-track {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 10px;
    }

    .pip {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--purple-600);
      transition: background 0.2s;
    }

    .pip.used {
      background: var(--gray-100);
    }

    .main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    .section-eyebrow {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      color: var(--gray-400);
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }

    .task-card {
      background: var(--white);
      border: 0.5px solid var(--gray-100);
      border-radius: 12px;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      transition: border 0.25s, box-shadow 0.25s;
    }

    .task-card.complete {
      border: 1.5px solid var(--teal-600);
      box-shadow: 0 0 0 3px rgba(15, 110, 86, 0.07);
    }

    .task-card.incomplete-warn {
      border: 1.5px solid var(--coral-600);
    }

    .task-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }

    .task-letter {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: var(--purple-50);
      color: var(--purple-600);
      font-size: 16px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .task-info { flex: 1; }

    .task-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--gray-800);
    }

    .task-desc {
      font-size: 12px;
      color: var(--gray-600);
      margin-top: 2px;
      line-height: 1.5;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--gray-100);
      flex-shrink: 0;
      margin-top: 5px;
      transition: background 0.2s;
    }

    .status-dot.done { background: var(--teal-600); }

    .sub-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--gray-400);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .assignee-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .assignee-btn {
      font-size: 12px;
      font-family: "IBM Plex Sans", sans-serif;
      padding: 5px 10px;
      border-radius: 6px;
      border: 0.5px solid var(--gray-200);
      background: transparent;
      color: var(--gray-600);
      cursor: pointer;
      transition: all 0.15s;
    }

    .assignee-btn:hover { background: var(--gray-50); border-color: var(--gray-400); }

    .assignee-btn.selected {
      background: var(--purple-600);
      color: var(--purple-50);
      border-color: var(--purple-600);
    }

    .token-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .tbtn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 0.5px solid var(--gray-200);
      background: transparent;
      cursor: pointer;
      font-size: 18px;
      font-family: "IBM Plex Sans", sans-serif;
      color: var(--gray-600);
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      transition: all 0.15s;
    }

    .tbtn:hover:not(:disabled) { background: var(--gray-50); border-color: var(--gray-400); color: var(--gray-800); }
    .tbtn:disabled { opacity: 0.25; cursor: default; }

    .token-display {
      font-size: 14px;
      font-weight: 500;
      color: var(--gray-800);
      min-width: 80px;
    }

    .token-mini-pips {
      display: flex;
      gap: 3px;
      flex-wrap: wrap;
    }

    .mini-pip {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--purple-600);
    }

    .assigned-status {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 8px 10px;
      background: var(--teal-50);
      border-radius: 8px;
    }

    .assigned-status span {
      font-size: 12px;
      color: var(--teal-800);
      font-weight: 500;
    }

    .clear-btn {
      font-size: 11px;
      font-family: "IBM Plex Sans", sans-serif;
      padding: 3px 8px;
      border-radius: 5px;
      border: 0.5px solid var(--gray-200);
      background: transparent;
      color: var(--gray-400);
      cursor: pointer;
      transition: all 0.15s;
    }

    .clear-btn:hover { color: var(--coral-600); border-color: var(--coral-600); }

    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      padding-top: 8px;
      border-top: 0.5px solid var(--gray-100);
    }

    .progress-text {
      font-size: 13px;
      color: var(--gray-600);
    }

    .progress-text strong { color: var(--gray-800); }

    .submit-btn {
      padding: 12px 36px;
      background: var(--purple-600);
      color: var(--purple-50);
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      font-family: "IBM Plex Sans", sans-serif;
      cursor: pointer;
      transition: all 0.2s;
    }

    .submit-btn:hover:not(:disabled) { background: var(--purple-800); }
    .submit-btn:disabled { opacity: 0.35; cursor: default; }

    .result-panel {
      display: none;
      background: var(--white);
      border: 0.5px solid var(--gray-100);
      border-radius: 12px;
      padding: 24px;
      margin-top: 24px;
    }

    .result-panel.show { display: block; }

    .result-panel h2 {
      font-size: 17px;
      font-weight: 500;
      margin-bottom: 16px;
    }

    .result-panel h2.ok { color: var(--teal-600); }
    .result-panel h2.warn { color: var(--coral-600); }

    .result-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }

    .result-item {
      background: var(--gray-50);
      border-radius: 8px;
      padding: 10px 14px;
    }

    .result-item .task-tag {
      font-size: 11px;
      font-weight: 500;
      color: var(--purple-600);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .result-item .assignee-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--gray-800);
    }

    .result-item .token-amount {
      font-size: 12px;
      color: var(--gray-600);
      margin-top: 1px;
    }

    .result-summary {
      font-size: 13px;
      color: var(--gray-600);
      line-height: 1.7;
      padding-top: 12px;
      border-top: 0.5px solid var(--gray-100);
    }

    .reset-btn {
      margin-top: 16px;
      padding: 8px 20px;
      border-radius: 6px;
      border: 0.5px solid var(--gray-200);
      background: transparent;
      font-size: 13px;
      font-family: "IBM Plex Sans", sans-serif;
      color: var(--gray-600);
      cursor: pointer;
      transition: all 0.15s;
    }

    .reset-btn:hover { background: var(--gray-50); border-color: var(--gray-400); }

    @media (max-width: 640px) {
      .page-header { flex-direction: column; }
      .token-summary { min-width: auto; width: 100%; }
      .main { padding: 20px 16px; }
    }
  </style>
</head>
<body>

<div class="page-header">
  <div>
    <h1>Time token allocation</h1>
    <p>You have <strong>20 time tokens</strong> to spend. Assign each task to a team member and decide how many tokens to invest. Every task must have an assignee and at least 1 token before you can submit.</p>
  </div>
  <div class="token-summary">
    <div class="big-num" id="bigCount">20</div>
    <div class="label">tokens remaining</div>
    <div class="token-track" id="pipTrack"></div>
  </div>
</div>

<div class="main">
  <div class="section-eyebrow">Tasks — assign &amp; allocate</div>
  <div class="board" id="board"></div>

  <div class="footer">
    <div class="progress-text" id="progressText">0 of 6 tasks allocated</div>
    <button class="submit-btn" id="submitBtn" onclick="checkAnswers()" disabled>Submit allocation</button>
  </div>

  <div class="result-panel" id="resultPanel">
    <h2 id="resultTitle"></h2>
    <div class="result-grid" id="resultGrid"></div>
    <div class="result-summary" id="resultSummary"></div>
    <button class="reset-btn" onclick="resetAll()">Reset and try again</button>
  </div>
</div>

<script>
  const TOTAL_TOKENS = 20;
  const EMPLOYEES = ['Self', 'Employee 1', 'Employee 2', 'Employee 3', 'Employee 4'];
  const TASKS = [
    { id: 'a', letter: 'A', name: 'Task A', desc: 'Draft the project brief and define scope' },
    { id: 'b', letter: 'B', name: 'Task B', desc: 'Run stakeholder alignment meeting' },
    { id: 'c', letter: 'C', name: 'Task C', desc: 'Conduct research and analysis' },
    { id: 'd', letter: 'D', name: 'Task D', desc: 'Produce design mockups' },
    { id: 'e', letter: 'E', name: 'Task E', desc: 'Write the summary report' },
    { id: 'f', letter: 'F', name: 'Task F', desc: 'Coordinate team communications' },
  ];

  let state = {};
  TASKS.forEach(t => { state[t.id] = { assignee: null, tokens: 0 }; });

  function tokensSpent() {
    return Object.values(state).reduce((s, v) => s + v.tokens, 0);
  }
  function tokensLeft() { return TOTAL_TOKENS - tokensSpent(); }

  function tasksComplete() {
    return TASKS.filter(t => state[t.id].assignee && state[t.id].tokens > 0).length;
  }

  function renderPips() {
    const left = tokensLeft();
    const track = document.getElementById('pipTrack');
    track.innerHTML = '';
    for (let i = 0; i < TOTAL_TOKENS; i++) {
      const d = document.createElement('div');
      d.className = 'pip' + (i >= left ? ' used' : '');
      track.appendChild(d);
    }
    document.getElementById('bigCount').textContent = left;
    const done = tasksComplete();
    document.getElementById('progressText').innerHTML = `<strong>${done}</strong> of ${TASKS.length} tasks allocated · <strong>${left}</strong> tokens remaining`;
    document.getElementById('submitBtn').disabled = !(done === TASKS.length);
  }

  function renderBoard() {
    const board = document.getElementById('board');
    board.innerHTML = '';
    TASKS.forEach(task => {
      const s = state[task.id];
      const left = tokensLeft();
      const isDone = s.assignee && s.tokens > 0;

      const card = document.createElement('div');
      card.className = 'task-card' + (isDone ? ' complete' : '');

      const assigneeBtns = EMPLOYEES.map(e =>
        `<button class="assignee-btn${s.assignee === e ? ' selected' : ''}" onclick="assign('${task.id}','${e.replace(/'/g,"\\'")}')">
          ${e}
        </button>`
      ).join('');

      const miniPips = s.tokens > 0
        ? Array.from({length: s.tokens}, () => `<div class="mini-pip"></div>`).join('')
        : '';

      const statusSection = isDone ? `
        <div class="assigned-status">
          <span>✓ ${s.assignee} &middot; ${s.tokens} token${s.tokens !== 1 ? 's' : ''}</span>
          <button class="clear-btn" onclick="unassign('${task.id}')">Clear</button>
        </div>` : '';

      card.innerHTML = `
        <div class="task-top">
          <div class="task-letter">${task.letter}</div>
          <div class="task-info">
            <div class="task-name">${task.name}</div>
            <div class="task-desc">${task.desc}</div>
          </div>
          <div class="status-dot${isDone ? ' done' : ''}"></div>
        </div>

        <div>
          <div class="sub-label">Assign to</div>
          <div class="assignee-row">${assigneeBtns}</div>
        </div>

        <div>
          <div class="sub-label">Time tokens</div>
          <div class="token-row">
            <button class="tbtn" onclick="changeTokens('${task.id}',-1)" ${s.tokens <= 0 ? 'disabled' : ''}>−</button>
            <div class="token-display">
              <div>${s.tokens} token${s.tokens !== 1 ? 's' : ''}</div>
              <div class="token-mini-pips">${miniPips}</div>
            </div>
            <button class="tbtn" onclick="changeTokens('${task.id}',1)" ${left <= 0 ? 'disabled' : ''}>+</button>
          </div>
        </div>

        ${statusSection}
      `;
      board.appendChild(card);
    });
    renderPips();
  }

  function assign(taskId, emp) {
    state[taskId].assignee = emp;
    renderBoard();
  }

  function unassign(taskId) {
    state[taskId].assignee = null;
    state[taskId].tokens = 0;
    renderBoard();
  }

  function changeTokens(taskId, delta) {
    const newVal = state[taskId].tokens + delta;
    if (newVal < 0) return;
    if (delta > 0 && tokensLeft() <= 0) return;
    state[taskId].tokens = newVal;
    renderBoard();
  }

  function checkAnswers() {
    const panel = document.getElementById('resultPanel');
    panel.classList.add('show');

    const spent = tokensSpent();
    const left = tokensLeft();
    const allAssigned = TASKS.every(t => state[t.id].assignee && state[t.id].tokens > 0);

    const titleEl = document.getElementById('resultTitle');
    const gridEl = document.getElementById('resultGrid');
    const summaryEl = document.getElementById('resultSummary');

    if (!allAssigned) {
      titleEl.textContent = 'Some tasks aren\'t fully set up';
      titleEl.className = 'warn';
      gridEl.innerHTML = '';
      summaryEl.textContent = 'Make sure every task has an assignee and at least 1 token before submitting.';
      return;
    }

    titleEl.textContent = left === 0 ? 'All tokens allocated — well done!' : `Submitted with ${left} token${left !== 1 ? 's' : ''} unspent`;
    titleEl.className = left === 0 ? 'ok' : 'warn';

    gridEl.innerHTML = TASKS.map(t => {
      const s = state[t.id];
      return `<div class="result-item">
        <div class="task-tag">${t.name}</div>
        <div class="assignee-name">${s.assignee}</div>
        <div class="token-amount">${s.tokens} token${s.tokens !== 1 ? 's' : ''}</div>
      </div>`;
    }).join('');

    const employeeCounts = {};
    EMPLOYEES.forEach(e => { employeeCounts[e] = { tasks: 0, tokens: 0 }; });
    TASKS.forEach(t => {
      const s = state[t.id];
      if (s.assignee) {
        employeeCounts[s.assignee].tasks++;
        employeeCounts[s.assignee].tokens += s.tokens;
      }
    });

    const breakdown = EMPLOYEES
      .filter(e => employeeCounts[e].tasks > 0)
      .map(e => `${e}: ${employeeCounts[e].tasks} task${employeeCounts[e].tasks !== 1 ? 's' : ''} (${employeeCounts[e].tokens} tokens)`)
      .join(' · ');

    summaryEl.innerHTML = `<strong>Team breakdown:</strong> ${breakdown}<br>Total tokens used: <strong>${spent} / ${TOTAL_TOKENS}</strong>`;

    panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function resetAll() {
    TASKS.forEach(t => { state[t.id] = { assignee: null, tokens: 0 }; });
    document.getElementById('resultPanel').classList.remove('show');
    renderBoard();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  renderBoard();
</script>
</body>
</html>
