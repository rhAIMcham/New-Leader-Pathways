<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat Questionnaire</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.33.0/dist/tabler-icons.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f5f5f7;
      --bg-tertiary: #ebebed;
      --bg-info: #e6f1fb;
      --bg-success: #eaf3de;
      --text-primary: #1a1a1a;
      --text-secondary: #6b6b74;
      --text-info: #185fa5;
      --text-success: #3b6d11;
      --border-light: rgba(0,0,0,0.10);
      --border-medium: rgba(0,0,0,0.18);
      --radius-md: 8px;
      --radius-lg: 12px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-primary: #1c1c1e;
        --bg-secondary: #2c2c2e;
        --bg-tertiary: #3a3a3c;
        --bg-info: #0c2d4a;
        --bg-success: #173404;
        --text-primary: #f2f2f7;
        --text-secondary: #aeaeb2;
        --text-info: #5aacf5;
        --text-success: #97c459;
        --border-light: rgba(255,255,255,0.10);
        --border-medium: rgba(255,255,255,0.18);
      }
    }

    body {
      font-family: var(--font);
      background: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    #app {
      width: 100%;
      max-width: 560px;
      display: flex;
      flex-direction: column;
      height: 580px;
      background: var(--bg-primary);
      border: 0.5px solid var(--border-light);
      border-radius: var(--radius-lg);
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    #chat-header {
      padding: 14px 18px;
      border-bottom: 0.5px solid var(--border-light);
      background: var(--bg-secondary);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .avatar {
      width: 34px; height: 34px; border-radius: 50%;
      background: var(--bg-info);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 600;
      color: var(--text-info);
      flex-shrink: 0;
    }

    #chat-header-info p:first-child {
      font-size: 14px; font-weight: 600; color: var(--text-primary);
    }
    #chat-header-info p:last-child {
      font-size: 12px; color: var(--text-secondary);
    }

    #progress-bar-outer { height: 3px; background: var(--bg-tertiary); }
    #progress-bar-inner {
      height: 3px;
      background: var(--text-info);
      transition: width 0.4s ease;
      width: 0%;
    }

    #messages {
      flex: 1;
      overflow-y: scroll;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }

    .bubble-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
      animation: fadeUp 0.25s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .bubble-row.bot  { align-self: flex-start; max-width: 80%; }
    .bubble-row.user { align-self: flex-end; flex-direction: row-reverse; max-width: 80%; }

    .bubble {
      padding: 10px 14px;
      font-size: 14px;
      line-height: 1.55;
      color: var(--text-primary);
      border-radius: 18px;
      max-width: 300px;
      overflow: auto;
    }

    .bubble-row.bot .bubble {
      background: var(--bg-secondary);
      border-bottom-left-radius: 4px;
      border: 0.5px solid var(--border-light);
    }

    .bubble-row.user .bubble {
      background: var(--bg-info);
      color: var(--text-info);
      border-bottom-right-radius: 4px;
    }

    .mini-avatar {
      width: 26px; height: 26px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 600;
      flex-shrink: 0;
    }
    .bubble-row.bot  .mini-avatar { background: var(--bg-info);     color: var(--text-info); }
    .bubble-row.user .mini-avatar { background: var(--bg-success);  color: var(--text-success); }

    .typing-indicator { display: flex; gap: 4px; padding: 12px 14px; }
    .typing-indicator span {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--text-secondary);
      animation: bounce 1.2s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }

    #input-area {
      padding: 12px 14px;
      border-top: 0.5px solid var(--border-light);
      display: flex;
      gap: 8px;
      align-items: flex-end;
      background: var(--bg-primary);
    }

    #user-input {
      flex: 1;
      resize: none;
      border: 0.5px solid var(--border-medium);
      border-radius: 18px;
      padding: 9px 14px;
      font-size: 14px;
      font-family: var(--font);
      background: var(--bg-secondary);
      color: var(--text-primary);
      line-height: 1.5;
      max-height: 100px;
      overflow-y: auto;
      outline: none;
      transition: border-color 0.15s;
    }
    #user-input:focus { border-color: var(--text-info); }
    #user-input::placeholder { color: var(--text-secondary); }

    #send-btn {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--text-info);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: #fff; flex-shrink: 0;
      transition: opacity 0.15s;
      font-size: 16px;
    }
    #send-btn:disabled { opacity: 0.35; cursor: default; }
    #send-btn:not(:disabled):hover { opacity: 0.85; }

    #done-area {
      padding: 16px;
      border-top: 0.5px solid var(--border-light);
      display: none;
      flex-direction: column;
      gap: 10px;
      background: var(--bg-primary);
    }

    #done-area p {
      font-size: 13px;
      color: var(--text-secondary);
      text-align: center;
    }

    #save-pdf-btn {
      display: flex; align-items: center; justify-content: center;
      gap: 8px;
      background: var(--text-info);
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      padding: 10px 18px;
      font-size: 14px;
      font-family: var(--font);
      cursor: pointer;
      font-weight: 600;
      transition: opacity 0.15s;
    }
    #save-pdf-btn:hover { opacity: 0.85; }
    #save-pdf-btn i { font-size: 18px; }
  </style>
</head>
<body>

<div id="app">
  <div id="chat-header">
    <div class="avatar">Q</div>
    <div id="chat-header-info">
      <p>Quick Questionnaire</p>
      <p id="header-status">Question 1 of 6</p>
    </div>
  </div>
  <div id="progress-bar-outer"><div id="progress-bar-inner"></div></div>
  <div id="messages"></div>
  <div id="input-area">
    <textarea id="user-input" rows="1" placeholder="Type your answer…" disabled></textarea>
    <button id="send-btn" disabled aria-label="Send">
      <i class="ti ti-arrow-up"></i>
    </button>
  </div>
  <div id="done-area">
    <p>All done! Save your answers as a PDF below.</p>
    <button id="save-pdf-btn">
      <i class="ti ti-file-download"></i>
      Save answers as PDF
    </button>
  </div>
</div>

<script>
  // ── Edit your questions and labels here ──────────────────────────────────
  const questions = [
    "Hey! How is your first day going? I hope you have been settling in ok.",
    "Good to hear. As you settle in, here are some things to bear in mind.",
    "What excites you about your new role and what concerns you?",
    "As you commence in the role, what are your priorities?",
    "What challenges do you think you might face?",
    "Finally, are there any things you're most excited about getting to implement as a manager?"
  ];

  const labels = [
    "Full name",
    "Email address",
    "Role / job title",
    "Team or department",
    "Goal for next 3 months",
    "Anything else"
  ];
  // ─────────────────────────────────────────────────────────────────────────

  const answers = [];
  let currentQ = 0;
  let waitingForBot = false;

  const messagesEl  = document.getElementById('messages');
  const inputEl     = document.getElementById('user-input');
  const sendBtn     = document.getElementById('send-btn');
  const doneArea    = document.getElementById('done-area');
  const inputArea   = document.getElementById('input-area');
  const headerStatus = document.getElementById('header-status');
  const progressBar = document.getElementById('progress-bar-inner');

  function updateProgress() {
    progressBar.style.width = (currentQ / questions.length * 100) + '%';
    headerStatus.textContent = currentQ < questions.length
      ? `Question ${currentQ + 1} of ${questions.length}`
      : 'All done!';
  }

  function addBubble(text, who) {
    const row = document.createElement('div');
    row.className = `bubble-row ${who}`;

    const av = document.createElement('div');
    av.className = 'mini-avatar';
    av.textContent = who === 'bot' ? 'Q' : 'Me';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    row.appendChild(av);
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function showTyping() {
    const row = document.createElement('div');
    row.className = 'bubble-row bot';
    row.id = 'typing';
    const av = document.createElement('div');
    av.className = 'mini-avatar';
    av.textContent = 'Q';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
    row.appendChild(av);
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  function askQuestion(index) {
    waitingForBot = true;
    inputEl.disabled = true;
    sendBtn.disabled = true;
    showTyping();
    setTimeout(() => {
      removeTyping();
      addBubble(questions[index], 'bot');
      waitingForBot = false;
      inputEl.disabled = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }, 700 + Math.random() * 400);
  }

  function handleSend() {
    const val = inputEl.value.trim();
    if (!val || waitingForBot) return;
    addBubble(val, 'user');
    answers.push({ label: labels[currentQ], answer: val });
    inputEl.value = '';
    inputEl.style.height = 'auto';
    currentQ++;
    updateProgress();

    if (currentQ < questions.length) {
      askQuestion(currentQ);
    } else {
      waitingForBot = true;
      inputEl.disabled = true;
      sendBtn.disabled = true;
      showTyping();
      setTimeout(() => {
        removeTyping();
        addBubble("That's everything — thanks so much! You can now save your answers as a PDF.", 'bot');
        waitingForBot = false;
        inputArea.style.display = 'none';
        doneArea.style.display = 'flex';
        progressBar.style.width = '100%';
      }, 800);
    }
  }

  sendBtn.addEventListener('click', handleSend);
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
  });
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + 'px';
    sendBtn.disabled = !inputEl.value.trim() || waitingForBot;
  });

  document.getElementById('save-pdf-btn').addEventListener('click', () => {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: 'pt', format: 'a4' });
    const W = doc.internal.pageSize.getWidth();
    const H = doc.internal.pageSize.getHeight();
    const margin = 52;
    let y = margin;

    // Header banner
    doc.setFillColor(230, 241, 251);
    doc.rect(0, 0, W, 72, 'F');
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(18);
    doc.setTextColor(24, 95, 165);
    doc.text('Questionnaire Responses', margin, 38);
    doc.setFontSize(10);
    doc.setFont('helvetica', 'normal');
    doc.setTextColor(100, 100, 110);
    const today = new Date().toLocaleDateString('en-AU', { day: 'numeric', month: 'long', year: 'numeric' });
    doc.text(`Saved on ${today}`, margin, 56);

    y = 104;

    answers.forEach((item, i) => {
      const wrapped = doc.splitTextToSize(item.answer, W - margin * 2 - 16);
      const blockH = 52 + (wrapped.length - 1) * 16;

      if (y + blockH > H - margin) { doc.addPage(); y = margin; }

      doc.setFillColor(248, 249, 252);
      doc.setDrawColor(210, 215, 225);
      doc.roundedRect(margin - 8, y - 18, W - (margin - 8) * 2, blockH + 10, 6, 6, 'FD');

      doc.setFont('helvetica', 'bold');
      doc.setFontSize(10);
      doc.setTextColor(24, 95, 165);
      doc.text(`Q${i + 1}  ${item.label}`, margin, y);

      doc.setFont('helvetica', 'normal');
      doc.setFontSize(12);
      doc.setTextColor(40, 40, 50);
      doc.text(wrapped, margin, y + 18);

      y += blockH + 20;
    });

    doc.save('questionnaire-answers.pdf');
  });

  // Kick things off
  updateProgress();
  setTimeout(() => askQuestion(0), 400);
</script>
</body>
</html>
