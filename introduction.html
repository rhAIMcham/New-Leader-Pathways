/*Pulse button animation */
.pulse-btn {
  background-color: var(--navy);
  color: white;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  
  /* Apply the animation */
  animation: pulse-border 2s infinite;
}

.pulse-btn:hover {
  color: var(--navy);
}

/*Pulse button animation */
.pulse-alert {
  background-color: var(--navy);
  border: none;
  border-radius: 4px;
  cursor: pointer;
  color: white;
  
  /* Apply the animation */
  animation: pulse-border 2s infinite;
}

.pulse-alert:hover {
  color: var(--navy);
  background-color: var(--lightBlue);
}

@keyframes pulse-border {
  0% {
    /* Start with a tight shadow around the element */
    box-shadow: 0 0 0 0 #12195C70;
  }
  70% {
    /* Expand the shadow outwards while keeping it somewhat solid */
    box-shadow: 0 0 0 15px #12195C00;
  }
  100% {
    /* Fade the expanded shadow completely out */
    box-shadow: 0 0 0 0 #12195C00;
  }
}
