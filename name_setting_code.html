<style>
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --AIMblue: #4353A3;
  --darkBlue: #38416D;
  --teal: #5DC8B9;
  --cream: #F1EEDE;
  --grey: #e7e9ec;
  --rust: #AF4510;
  --navy: #12195C;
  --white: #ffffff;
  --lightBlue: #AEBAE4;
  }
    body {
        font-family: 'Inter', sans-serif;
    }

    .container {
       max-width: 400px;
       margin: 0 auto;
       padding: 1rem;
       background: #f8f9fa;
       border-radius: 12px;
       box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      
       font-family: 'Inter', sans-serif;
    }

    h3 {
       margin-bottom: 0.5rem;
       text-align: left;
    }
    textarea {
          margin: 10px;
        width: 85%;
        padding: 0.75rem;
        border-radius: 8px;
        border: 1px solid #ccc;
        resize: vertical;
        font-size: 1rem;
        font-family: 'Inter', sans-serif;
    }

    .saveButtons {
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        align-items: end;
        margin-left: 0.5rem;
    }

    #statusMsg {
        font-size: 0.9rem;
        color: var(--lightBlue);
        opacity: 0;
        transition: opacity 0.4s ease;
        margin: 0;
        min-width: 60px; 
    }

    #saveBtn {
    background-color: var(--navy);;
    color: white;
    border: none;
    border-radius: 6px;
    padding: 0.5rem 1.25rem;
    font-size: 1rem;
    cursor: pointer;
    }
</style>
<body>
<div class="container">
    <div>
  <h3>Your name</h3>
</div>
<div style="display: flex;">
  <textarea placeholder="Your first name" id="firstName" maxlength="10"></textarea>
  <textarea placeholder="Your last initial" id="lastInitial" maxlength="1"></textarea>
  <!-- Flexbox row: Saved! stays left, Save button stays right -->
  
  </div>
  <div class="saveButtons">
    <p id="statusMsg">Saved!</p>
    <button id="saveBtn"
    >Save</button>
  </div>
</div>
</body>
<script>
(function() {
  const firstName = document.getElementById('firstName');
  const lastInitial = document.getElementById('lastInitial');
  const saveBtn = document.getElementById('saveBtn');
  const statusMsg = document.getElementById('statusMsg');

  // Each lesson uses a unique key (example: eNotes1, eNotes2, eNotes3)
  const STORAGE_KEY = 'riseUserName';
  const STORAGE_KEY_LI = 'lastInitialToken'

  // Load existing note (if any)
  const savedRUN = localStorage.getItem(STORAGE_KEY);
  if (savedRUN) firstName.value = savedRUN;

  // Save on button click
  saveBtn.addEventListener('click', () => {
    localStorage.setItem(STORAGE_KEY, firstName.value.trim());
    localStorage.setItem(STORAGE_KEY_LI, lastInitial.value.trim());

    // Fade in "Saved!"
    statusMsg.style.opacity = '1';
    setTimeout(() => statusMsg.style.opacity = '0', 1500);
  });

  // Optional: auto-save while typing
  firstName.addEventListener('input', () => {
    localStorage.setItem(STORAGE_KEY, firstName.value.trim());
    localStorage.setItem(STORAGE_KEY_LI, lastInitial.value.trim());
  });
})();
</script>
